name: Build ODM Premium APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldd scons build-essential libgl1-mesa-dev libgles2-mesa-dev zlib1g-dev libgstreamer1.0-dev libcairo2-dev libpango1.0-dev libgstreamer-plugins-base1.0-dev ccache openjdk-17-jdk unzip python3-pip python3-setuptools python3-virtualenv

      - name: Install Buildozer Globally (Bypass System Lock)
        run: |
          # --break-system-packages ব্যবহার করে গ্লোবালি ইনস্টল করা হচ্ছে যাতে বিল্ডোজার সব পাথ খুঁজে পায়
          pip install --upgrade pip --break-system-packages
          pip install buildozer cython kivy --break-system-packages

      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ODM-Cyberpunk-App
          path: bin/*.apk
