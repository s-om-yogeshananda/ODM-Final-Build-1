name: Build ODM APK
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Buildozer Action
        uses: Subameyer/buildozer-action@v2
        with:
          command: buildozer -v android debug
